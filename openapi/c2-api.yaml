        workflowId:
          type: string
        doorId:
          type: integer
        batteryPct:
          type: integer
          minimum: 0
          maximum: 100
        timestamp:
          type: string
          format: date-time
        timestampMs:
          type: integer
          description: Optional SMARTBox epoch timestamp compatibility field.
        sequenceNo:
          type: integer
        payload:
          type: object
          additionalProperties: true

    CreateAmrMissionRequest:
      type: object
      required: [workflowId, missionType, smartBoxId, pickupLocation, dropoffLocation]
      properties:
        workflowId:
