          enum: [AVAILABLE, RESERVED, LOADING, LOADED, DELIVERING, READY_FOR_COLLECTION, COLLECTION_IN_PROGRESS, OFFLINE, FAULTED]
        occupiedFlag:
          type: boolean
        assignedWorkflowId:
          type: string
        assignedMrvItemId:
          type: string

    SmartBoxResponseEnvelope:
      allOf:
